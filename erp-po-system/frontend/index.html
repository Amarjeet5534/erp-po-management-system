<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERP Purchase Order Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
}

.sidebar{
position:fixed;
width:220px;
height:100vh;
background:#111;
padding:20px;
}

.sidebar a{
display:block;
color:#aaa;
padding:8px;
text-decoration:none;
}

.sidebar a:hover{
color:white;
}

.main{
margin-left:240px;
padding:30px;
}

.stat{
background:#141414;
padding:20px;
border-radius:8px;
}

.table-box{
background:#141414;
padding:20px;
border-radius:10px;
}

.status{
padding:4px 12px;
border-radius:20px;
font-size:12px;
}

.pending{
background:#3f2f00;
color:#ffd700;
}

.approved{
background:#053b17;
color:#00ff7f;
}

.rejected{
background:#4a0000;
color:#ff5a5a;
}

</style>

</head>


<body>

<div class="sidebar">

<h4>ERP</h4>

<a href="#">Dashboard</a>
<a href="#">Vendors</a>
<a href="#">Products</a>

</div>


<div class="main">

<h3>Purchase Orders</h3>

<br>

<div class="row">

<div class="col-md-3">
<div class="stat">
<h6>Total Orders</h6>
<h3 id="totalOrders">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="stat">
<h6>Total Vendors</h6>
<h3 id="totalVendors">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="stat">
<h6>Pending</h6>
<h3 id="pendingOrders">0</h3>
</div>
</div>

</div>

<br>

<div class="table-box">

<div class="d-flex justify-content-between">

<h5>Purchase Orders</h5>

<a href="create-po.html" class="btn btn-success btn-sm">
Create PO
</a>

</div>

<br>

<table class="table table-dark">

<thead>
<tr>
<th>ID</th>
<th>Reference</th>
<th>Vendor</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>

<tbody id="poTable"></tbody>

</table>

</div>

</div>


<script>

const API="http://127.0.0.1:8000"

async function loadDashboard(){

let poRes=await fetch(API+"/purchase-orders")
let vendorRes=await fetch(API+"/vendors")

let pos=await poRes.json()
let vendors=await vendorRes.json()

document.getElementById("totalOrders").innerText=pos.length
document.getElementById("totalVendors").innerText=vendors.length

let pending=pos.filter(p=>p.status==="Pending").length

document.getElementById("pendingOrders").innerText=pending

renderTable(pos)

}


function renderTable(data){

let table=document.getElementById("poTable")

table.innerHTML=""

data.forEach(po=>{

let statusClass="pending"

if(po.status==="Approved") statusClass="approved"
if(po.status==="Rejected") statusClass="rejected"

table.innerHTML+=`

<tr>
<td>${po.id}</td>
<td>${po.reference_no}</td>
<td>${po.vendor_id}</td>
<td>₹${po.total_amount}</td>
<td><span class="status ${statusClass}">${po.status}</span></td>
</tr>

`

})

}

loadDashboard()

</script>

</body>
</html>
