<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Purchase Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
}

.page{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:#141414;
padding:30px;
border-radius:10px;
}

</style>

</head>


<body>

<div class="page">

<div class="card">

<h3>Create Purchase Order</h3>

<br>

<div class="row">

<div class="col-md-6">

<label>Reference</label>
<input id="reference" class="form-control">

</div>

<div class="col-md-6">

<label>Vendor</label>
<select id="vendorSelect" class="form-control"></select>

</div>

</div>

<br>

<table class="table table-dark">

<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th></th>
</tr>
</thead>

<tbody id="productRows"></tbody>

</table>

<button class="btn btn-primary" onclick="addRow()">Add Product</button>

<br><br>

<button class="btn btn-success" onclick="submitPO()">
Submit PO
</button>

</div>

</div>


<script>

const API="http://127.0.0.1:8000"

let products=[]


async function loadData(){

let vendors=await fetch(API+"/vendors").then(r=>r.json())
products=await fetch(API+"/products").then(r=>r.json())

let vendorSelect=document.getElementById("vendorSelect")

vendors.forEach(v=>{

let opt=document.createElement("option")
opt.value=v.id
opt.text=v.name

vendorSelect.appendChild(opt)

})

addRow()

}


function addRow(){

let table=document.getElementById("productRows")

let options=""

products.forEach(p=>{
options+=`<option value="${p.id}">${p.name}</option>`
})

let row=document.createElement("tr")

row.innerHTML=`

<td>
<select class="form-control product">${options}</select>
</td>

<td>
<input type="number" class="form-control qty" value="1">
</td>

<td>
<button onclick="this.parentNode.parentNode.remove()">X</button>
</td>

`

table.appendChild(row)

}


async function submitPO(){

let reference=document.getElementById("reference").value
let vendor=document.getElementById("vendorSelect").value

let rows=document.querySelectorAll("#productRows tr")

let items=[]

rows.forEach(r=>{

let product=r.querySelector(".product").value
let qty=r.querySelector(".qty").value

items.push({
product_id:parseInt(product),
quantity:parseInt(qty),
price:0
})

})

let data=new URLSearchParams()

data.append("reference_no",reference)
data.append("vendor_id",vendor)
data.append("items",JSON.stringify(items))

let res=await fetch(API+"/purchase-orders",{
method:"POST",
body:data
})

let result=await res.json()

alert("PO Created | Total ₹"+result.total_amount)

window.location="index.html"

}

loadData()

</script>

</body>
</html>
